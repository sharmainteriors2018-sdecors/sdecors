[build]
  publish = "."

# ---------------------------------------------------------------------------
# Domain: force the final custom domain over the Netlify staging subdomain,
# and force the non-www apex over to www (matches the canonical URLs used
# throughout the site: https://www.sdecors.in/...).
# Netlify auto-applies these once sdecors.in / www.sdecors.in are added as
# custom domains in Site settings -> Domain management.
# ---------------------------------------------------------------------------
[[redirects]]
  from = "https://sdecorswebsite.netlify.app/*"
  to = "https://www.sdecors.in/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://sdecors.in/*"
  to = "https://www.sdecors.in/:splat"
  status = 301
  force = true

# Book-Match Panels was restructured into Book Match Sheets (with Marble and
# Fabric sub-types) -- preserve any inbound links/bookmarks to the old URL.
[[redirects]]
  from = "/book-match-panels.html"
  to = "/book-match-sheets.html"
  status = 301
  force = true

# Netlify serves /404.html automatically with a real 404 status for any
# unmatched path, no redirect rule required -- this line is just explicit
# about it so the behaviour isn't accidentally overridden later.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
